<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uber Driver Net Fare Calculator</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #b2f0ff, #66d9ff, #3399ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 400px;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .results {
      margin-top: 20px;
      font-size: 14px;
    }

    .results div {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .final {
      font-size: 18px;
      font-weight: bold;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Uber Net Fare Calculator (€)</h1>

    <div class="input-group">
      <label>Total Earnings (Including Tips)</label>
      <input type="number" id="total" placeholder="Enter total earnings" oninput="calculate()" />
    </div>

    <div class="input-group">
      <label>Tips Amount</label>
      <input type="number" id="tips" placeholder="Enter tips" oninput="calculate()" />
    </div>

    <div class="input-group">
      <label>Diesel Cost</label>
      <input type="number" id="diesel" placeholder="Enter diesel cost" oninput="calculate()" />
    </div>

    <div class="results">
      <div>
        <span>6% Tax</span>
        <span id="tax">€0.00</span>
      </div>
      <div>
        <span>After Tax</span>
        <span id="afterTax">€0.00</span>
      </div>
      <div>
        <span>Split Amount (After Diesel ÷ 2)</span>
        <span id="split">€0.00</span>
      </div>

      <div class="final">
        <span>Final Net Fare</span>
        <span id="net">€0.00</span>
      </div>
    </div>
  </div>

  <script>
    function calculate() {
      const total = parseFloat(document.getElementById("total").value) || 0;
      const tips = parseFloat(document.getElementById("tips").value) || 0;
      const diesel = parseFloat(document.getElementById("diesel").value) || 0;

      const tax = total * 0.06;
      const afterTax = total - tax;
      const splitAmount = (afterTax - diesel) / 2;
      const netFare = splitAmount + tips;

      document.getElementById("tax").innerText = "€" + tax.toFixed(2);
      document.getElementById("afterTax").innerText = "€" + afterTax.toFixed(2);
      document.getElementById("split").innerText = "€" + splitAmount.toFixed(2);
      document.getElementById("net").innerText = "€" + netFare.toFixed(2);
    }
  </script>

</body>
</html>
